<text x="80" y="716" font-size="12" fill="#333" font-weight="bold">Batching shifts decode weight-GEMM → KV-attention at just B≈20 (seq 16k): GEMM absolute time is flat (per-token GEMM drops 30×), OSCAR grows ∝ batch.</text>
<text x="80" y="734" font-size="12" fill="#333">Q/K rotation GEMM stays a flat ~1.4 ms even under batch (1.4% → 0.5% of decode); the growth is INT2/HP attention (KV read), not rotation. → "rotation inefficiency" not supported.</text>
