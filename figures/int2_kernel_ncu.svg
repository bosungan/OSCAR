<text x="78" y="640" font-size="12.5" font-weight="bold" fill="#333">Root causes (NCU rules):</text>
<text x="78" y="658.0" font-size="11.5" fill="#333">1. 255 registers/thread → only 2 blocks/SM → occupancy capped at 16.7% (achieved 8–14%).</text>
<text x="78" y="675.0" font-size="11.5" fill="#333">2. b=1 grid = 64 blocks &lt; 84 SMs (0.38 waves): can't even fill the GPU once. Batching b1→b8 lifts MBU 27→43%.</text>
<text x="78" y="692.0" font-size="11.5" fill="#333">3. 56% uncoalesced global loads: strided INT2+scale KV layout wastes &gt;half the L1TEX sectors.</text>
<text x="78" y="709.0" font-size="11.5" fill="#333">4. No tensor cores — ALU (integer dequant) is the busiest pipe (37–51%), FP32-peak ~0%  → CUDA-core path.</text>
<text x="78" y="750" font-size="10" fill="#999">config proxies for server-feasible (1,256k)/(32,16k) — NCU needs in-process bench_one_batch (one-shot prefill OOMs b16/b32). source: profiling/ncu-kernel/INT2_KERNEL_ANALYSIS.md</text>
