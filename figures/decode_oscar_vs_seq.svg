<text x="80" y="716" font-size="12" fill="#333" font-weight="bold">Decode bottleneck shifts weight-GEMM → KV-attention at ~200k: GEMM time is constant (weight-bound), OSCAR grows ∝ seq (INT2 attn reads the whole KV).</text>
<text x="80" y="734" font-size="12" fill="#333">OSCAR-specific OVERHEAD (rotation+merge+HP) stays a flat ~0.8 ms/step (≈1% → 0.4% of decode); the growth is the KV read, fundamental to any KV-cache method (8× larger in BF16).</text>
